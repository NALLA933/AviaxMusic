general_1 : "КҖбҙҮбҙҳКҹКҸ бҙӣбҙҸ бҙҖ бҙңкңұбҙҮКҖ'кңұ бҙҚбҙҮкңұкңұбҙҖЙўбҙҮ бҙҸКҖ ЙўЙӘбҙ бҙҮ бҙңкңұбҙҮКҖЙҙбҙҖбҙҚбҙҮ / бҙңкңұбҙҮКҖ ЙӘбҙ… ."
general_2 : "кңұбҙҸбҙҚбҙҮ **бҙҮxбҙ„бҙҮбҙҳбҙӣЙӘбҙҸЙҙ бҙҸбҙ„бҙ„бҙңКҖбҙҮбҙ…** бҙЎКңЙӘКҹбҙҮ бҙҳКҖбҙҸбҙ„бҙҮкңұкңұЙӘЙҙЙў КҸбҙҸбҙңКҖ З«бҙңбҙҮКҖКҸ .\Йҙ\ЙҙбҙҮxбҙ„бҙҮбҙҳбҙӣЙӘбҙҸЙҙ бҙӣКҸбҙҳбҙҮ : {0}</code>"
general_3 : "КҸбҙҸбҙң'КҖбҙҮ бҙҖЙҙ бҙҖЙҙбҙҸЙҙКҸбҙҚбҙҸбҙңкңұ бҙҖбҙ…бҙҚЙӘЙҙ ЙӘЙҙ бҙӣКңЙӘкңұ бҙ„КңбҙҖбҙӣ ЙўКҖбҙҸбҙңбҙҳ ! \ЙҙКҖбҙҮбҙ бҙҮКҖбҙӣ КҷбҙҖбҙ„бҙӢ бҙӣбҙҸ бҙңкңұбҙҮКҖ бҙҖбҙ„бҙ„бҙҸбҙңЙҙбҙӣ Т“КҖбҙҸбҙҚ бҙҖбҙ…бҙҚЙӘЙҙ КҖЙӘЙўКңбҙӣкңұ."
general_4 : "КҸбҙҸбҙң ЙҙбҙҮбҙҮбҙ… бҙӣбҙҸ КҷбҙҮ бҙҖбҙ…бҙҚЙӘЙҙ бҙЎЙӘбҙӣКң бҙҚбҙҖЙҙбҙҖЙўбҙҮ бҙ бҙҸЙӘбҙ„бҙҮ бҙ„КңбҙҖбҙӣ КҖЙӘЙўКңбҙӣкңұ бҙӣбҙҸ бҙҳбҙҮКҖТ“бҙҸКҖбҙҚ бҙӣКңЙӘкңұ бҙҖбҙ„бҙӣЙӘбҙҸЙҙ .\Йҙ\ЙҙКҖбҙҮКҹбҙҸбҙҖбҙ… бҙҖбҙ…бҙҚЙӘЙҙ бҙ„бҙҖбҙ„КңбҙҮ бҙ ЙӘбҙҖ /reload"
general_5 : "КҷбҙҸбҙӣ ЙӘкңұЙҙ'бҙӣ кңұбҙӣКҖбҙҮбҙҖбҙҚЙӘЙҙЙў бҙҸЙҙ бҙ бҙҸЙӘбҙ„бҙҮ бҙ„КңбҙҖбҙӣ ."

