call_1 : "КҷбҙҸбҙӣ КҖбҙҮЗ«бҙңЙӘКҖбҙҮкңұ <b> ЙӘЙҙбҙ ЙӘбҙӣбҙҮ бҙңкңұбҙҮКҖкңұ бҙ ЙӘбҙҖ КҹЙӘЙҙбҙӢ</b> бҙҳбҙҮКҖбҙҚЙӘкңұкңұЙӘбҙҸЙҙ бҙӣбҙҸ ЙӘЙҙбҙ ЙӘбҙӣбҙҮ бҙҖкңұкңұЙӘкңұбҙӣбҙҖЙҙбҙӣ бҙӣбҙҸ КҸбҙҸбҙңКҖ бҙ„КңбҙҖбҙӣ ."
call_2 : "<u>{0} бҙҖкңұкңұЙӘкңұбҙӣбҙҖЙҙбҙӣ ЙӘкңұ КҷбҙҖЙҙЙҙбҙҮбҙ… ЙӘЙҙ КҸбҙҸбҙңКҖ ЙўКҖбҙҸбҙңбҙҳ / бҙ„КңбҙҖЙҙЙҙбҙҮКҹ .</u>\n\n<b>ЙӘбҙ… :</b> <code>{1}</code>\n<b>ЙҙбҙҖбҙҚбҙҮ :</b> {2}\n<b>бҙңкңұбҙҮКҖЙҙбҙҖбҙҚбҙҮ :</b> @{3}\n\nбҙҳКҹбҙҮбҙҖкңұбҙҮ бҙңЙҙКҷбҙҖЙҙ бҙӣКңбҙҮ бҙҖкңұкңұЙӘкңұбҙӣбҙҖЙҙбҙӣ бҙҖЙҙбҙ… бҙӣКҖКҸ бҙҖЙўбҙҖЙӘЙҙ ."
call_3 : "Т“бҙҖЙӘКҹбҙҮбҙ… бҙӣбҙҸ ЙӘЙҙбҙ ЙӘбҙӣбҙҮ {0} бҙҖкңұкңұЙӘкңұбҙӣбҙҖЙҙбҙӣ бҙӣбҙҸ КҸбҙҸбҙңКҖ бҙ„КңбҙҖбҙӣ .\n\nКҖбҙҮбҙҖкңұбҙҸЙҙ : <code>{1}</code>"
call_4 : "бҙҳКҹбҙҮбҙҖкңұбҙҮ бҙЎбҙҖЙӘбҙӣ .....\n\nЙӘЙҙбҙ ЙӘбҙӣЙӘЙҙЙў {0} бҙҖкңұкңұЙӘкңұбҙӣбҙҖЙҙбҙӣ бҙӣбҙҸ КҸбҙҸбҙңКҖ бҙ„КңбҙҖбҙӣ ..."
