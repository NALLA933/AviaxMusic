call_6 : "Т“бҙҖЙӘКҹбҙҮбҙ… бҙӣбҙҸ кңұбҙЎЙӘбҙӣбҙ„Кң кңұбҙӣКҖбҙҮбҙҖбҙҚ , бҙҳКҹбҙҮбҙҖкңұбҙҮ бҙңкңұбҙҮ /skip бҙӣбҙҸ бҙ„КңбҙҖЙҙЙўбҙҮ бҙӣКңбҙҮ бҙӣКҖбҙҖбҙ„бҙӢ ."
